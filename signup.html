<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Lumina Staging</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">

    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/bootstrap.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">

    <style>
        .social-icon-btn {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: white;
            border: 1px solid rgba(0,0,0,0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            padding: 0;
            cursor: pointer;
        }
        .social-icon-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.05);
            border-color: rgba(0,0,0,0.15);
        }
        [data-theme="dark"] .social-icon-btn {
            background: #2d3748;
            border-color: rgba(255,255,255,0.1);
        }
        [data-theme="dark"] .social-icon-btn:hover {
            background: #374151;
        }
        
        .apple-icon {
            fill: #000000;
        }
        [data-theme="dark"] .apple-icon {
            fill: #ffffff;
        }
        
        .divider {
            position: relative;
            text-align: center;
            margin: 2rem 0;
            width: 100%;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(0,0,0,0.08);
        }
        [data-theme="dark"] .divider::before {
            background: rgba(255,255,255,0.1);
        }
        .divider span {
            background: white;
            padding: 0 1rem;
            position: relative;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        [data-theme="dark"] .divider span {
            background: #1a202c;
        }
    </style>
</head>
<body class="bg-surface h-100">
    <div class="container-fluid min-vh-100 d-flex flex-column">
        <!-- Centered Brand -->
        <div class="text-center pt-5">
            <a href="index.html" class="nav-brand d-inline-flex">
                <div class="brand-logo"><img src="assets/images/logo.png" alt="Lumina Staging Logo"></div>
                <h2 class="brand-name">Lumina<span>Staging</span></h2>
            </a>
        </div>

        <div class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
            <div class="glass-card max-w-md w-100 mx-3 p-4 p-md-5">
                <div class="text-center mb-4">
                    <h1 class="h2 mb-2">Create Account</h1>
                    <p class="text-secondary">Join us and discover premium home staging services to elevate your listings.</p>
                </div>

                <form action="#" method="POST">
                    <div class="row gx-3 mx-0 mb-3"> <!-- Fixed alignment for name row -->
                        <div class="col-6 px-1">
                            <div class="form-group mb-0">
                                <label class="form-label" for="firstName">First Name</label>
                                <input type="text" id="firstName" class="form-control" required>
                            </div>
                        </div>
                        <div class="col-6 px-1">
                            <div class="form-group mb-0">
                                <label class="form-label" for="lastName">Last Name</label>
                                <input type="text" id="lastName" class="form-control" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" required placeholder="you@domain.com">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" class="form-control" required placeholder="••••••••">
                    </div>

                    <div class="form-group form-check mb-4">
                        <input type="checkbox" class="form-check-input" id="terms" required>
                        <label class="form-check-label text-secondary text-sm" for="terms">I agree to the Terms of Service and Privacy Policy</label>
                    </div>

                    <div class="text-center mb-4">
                        <button type="submit" class="btn btn-primary w-100">Sign Up</button>
                    </div>

                    <div class="divider">
                        <span>Or sign up with</span>
                    </div>

                    <div class="d-flex justify-content-center gap-4 mb-4"> <!-- Robust Flex centering -->
                        <button type="button" class="social-icon-btn btn" aria-label="Sign up with Google">
                            <svg width="24" height="24" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                                <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.791 2.716l2.9 2.249C16.638 14.183 18 11.903 18 9.2z" fill="#4285F4"/>
                                <path d="M9 18c2.43 0 4.467-.806 5.956-2.194l-2.9-2.249c-.803.538-1.83.855-3.056.855-2.35 0-4.336-1.587-5.044-3.719L.893 13.064C2.369 15.994 5.4 18 9 18z" fill="#34A853"/>
                                <path d="M3.956 10.693A5.441 5.441 0 0 1 3.6 9c0-.584.1-1.155.281-1.693L1.037 5.093A8.995 8.995 0 0 0 0 9c0 1.391.319 2.709.893 3.886l3.063-2.193z" fill="#FBBC05"/>
                                <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.4 0 2.369 2.006.893 4.936l3.063 2.378C4.664 5.167 6.65 3.58 9 3.58z" fill="#EA4335"/>
                            </svg>
                        </button>
                        <button type="button" class="social-icon-btn btn" aria-label="Sign up with Apple">
                            <svg class="apple-icon" width="24" height="24" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                                <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z" />
                            </svg>
                        </button>
                    </div>
                    
                    <div class="text-center">
                        <p class="text-secondary mb-0">Already have an account? <a href="login.html" class="font-weight-600">Log In</a></p>
                    </div>
                </form>
            </div>
        </div>

        <!-- Minimalist Footer -->
        <div class="text-center pb-4">
            <p class="text-secondary text-sm mb-0">&copy; 2026 Lumina Staging. All rights reserved.</p>
        </div>
    </div>

    <script src="assets/js/theme-toggle.js"></script>
</body>
</html>
