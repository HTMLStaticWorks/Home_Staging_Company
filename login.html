<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Lumina Staging</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/bootstrap.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
</head>
<body class="bg-surface h-100">
    <div class="container-fluid min-vh-100 d-flex flex-column">
        <!-- Centered Brand -->
        <div class="text-center pt-5">
            <a href="index.html" class="nav-brand d-inline-block">
                <h2 class="mb-0">Lumina<span>Staging</span></h2>
            </a>
        </div>

        <div class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
            <div class="glass-card max-w-md w-100 mx-3 p-4 p-md-5">
                <div class="text-center mb-4">
                    <h1 class="h2 mb-2">Welcome Back</h1>
                    <p class="text-secondary">Log in to manage your staging projects.</p>
                </div>

                <form action="#" method="POST">
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" required placeholder="you@domain.com">
                    </div>
                    
                    <div class="form-group">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="form-label mb-0" for="password">Password</label>
                            <a href="#" class="text-sm">Forgot password?</a>
                        </div>
                        <input type="password" id="password" class="form-control" required placeholder="••••••••">
                    </div>

                    <div class="form-group form-check mb-4">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label text-secondary" for="remember">Remember me</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-4">Log In</button>
                    
                    <div class="text-center">
                        <p class="text-secondary mb-0">Don't have an account? <a href="signup.html" class="font-weight-600">Sign up</a></p>
                    </div>
                </form>
            </div>
        </div>

        <!-- Minimalist Footer -->
        <div class="text-center pb-4">
            <p class="text-secondary text-sm mb-0">&copy; 2026 Lumina Staging. All rights reserved.</p>
        </div>
    </div>

    <script src="assets/js/theme-toggle.js"></script>
</body>
</html>
